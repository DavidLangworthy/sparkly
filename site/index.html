<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitter Paint</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #f5f5f3;
      --ink: #1d1e22;
      --muted: #66635e;
      --line: rgba(24, 28, 38, 0.11);
      --panel: rgba(255, 255, 255, 0.94);
      --panel-strong: rgba(255, 255, 255, 0.98);
      --focus: #2f7cf6;
      --shadow-lg: 0 18px 42px rgba(24, 28, 38, 0.1);
      --shadow-sm: 0 10px 24px rgba(24, 28, 38, 0.08);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.94), transparent 34%),
        radial-gradient(circle at 84% 12%, rgba(201, 224, 255, 0.28), transparent 28%),
        linear-gradient(180deg, #fafaf8 0%, #f1f1ee 100%);
      overflow: hidden;
    }

    button,
    input,
    summary {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    summary:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--focus) 40%, white);
      outline-offset: 2px;
    }

    .app-shell {
      height: 100vh;
      max-width: 1600px;
      margin: 0 auto;
      padding: 10px 14px 8px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 6px;
    }

    .header-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px 16px;
    }

    .brand {
      display: grid;
      gap: 1px;
      min-width: 0;
    }

    .brand-meta {
      display: grid;
      gap: 1px;
      min-width: 0;
    }

    .brand-meta strong {
      font-size: clamp(1rem, 2.1vw, 1.2rem);
      letter-spacing: -0.02em;
    }

    .brand-meta span {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.24;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(80vw, 760px);
    }

    .header-tools {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      min-width: min(100%, 560px);
    }

    .action-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .toolbar-button,
    .action-button,
    .segment-button {
      padding: 9px 13px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow-sm);
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 700;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .toolbar-button,
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .toolbar-button:hover,
    .action-button:hover:not(:disabled),
    .segment-button:hover {
      transform: translateY(-1px);
    }

    .action-button--primary {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(226, 238, 255, 0.94));
    }

    .action-button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      transform: none;
    }

    .action-button.is-busy {
      opacity: 1;
      color: #12345e;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.98), rgba(177, 218, 255, 0.96) 42%, rgba(212, 189, 255, 0.92));
      box-shadow: 0 0 0 3px rgba(47, 124, 246, 0.12);
    }

    .action-button.is-busy::after {
      content: "";
      display: inline-block;
      width: 0.82em;
      height: 0.82em;
      margin-left: 0.5em;
      border-radius: 999px;
      border: 2px solid rgba(18, 52, 94, 0.2);
      border-top-color: rgba(18, 52, 94, 0.92);
      animation: export-spin 0.7s linear infinite;
      vertical-align: -0.1em;
    }

    .controls-popover {
      position: relative;
    }

    .controls-popover summary {
      list-style: none;
      cursor: pointer;
    }

    .controls-popover summary::-webkit-details-marker {
      display: none;
    }

    .controls-popover[open] > summary {
      border-color: rgba(47, 124, 246, 0.32);
      box-shadow: 0 0 0 3px rgba(47, 124, 246, 0.1);
    }

    .controls-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 20;
      width: min(430px, 92vw);
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel-strong);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(18px);
    }

    .group-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6a665f;
    }

    .slider-card,
    .segmented,
    .background-card,
    .size-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(248, 249, 251, 0.92);
    }

    .slider-card {
      justify-content: space-between;
    }

    .slider-label {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 4px 8px;
      min-width: 104px;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .slider-value {
      font-size: 0.96rem;
      font-weight: 700;
      color: var(--ink);
    }

    .slider-card input[type="range"] {
      width: min(40vw, 180px);
      accent-color: #2f7cf6;
    }

    .segmented {
      gap: 6px;
      justify-content: flex-end;
    }

    .segment-button {
      box-shadow: none;
      background: transparent;
      color: var(--muted);
    }

    .segment-button.is-active {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(226, 238, 255, 0.94));
      color: var(--ink);
    }

    .background-card,
    .size-card {
      flex-wrap: wrap;
    }

    .background-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .background-chip {
      position: relative;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(25, 25, 25, 0.14);
      background: var(--bg-color, #ffffff);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .background-chip.is-active {
      border-color: rgba(47, 124, 246, 0.42);
      box-shadow: 0 0 0 3px rgba(47, 124, 246, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.82);
    }

    .background-chip--transparent {
      background: rgba(255, 255, 255, 0.96);
    }

    .background-chip--transparent::after {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 999px;
      border: 2px solid rgba(160, 51, 51, 0.45);
      transform: rotate(-24deg);
    }

    .size-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }

    .size-field {
      display: grid;
      gap: 3px;
      min-width: 72px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6a665f;
    }

    .size-field input {
      width: 100%;
      padding: 7px 9px;
      border-radius: 10px;
      border: 1px solid rgba(25, 25, 25, 0.1);
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
    }

    .size-apply {
      padding-inline: 12px;
    }

    .ink-shelf {
      min-width: 0;
    }

    .ink-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      gap: 8px;
      align-items: stretch;
      padding: 0;
    }

    .ink-option {
      position: relative;
      display: block;
      min-width: 0;
      padding: 0 0 5px;
      background: transparent;
      color: inherit;
      text-align: left;
      border: 0;
    }

    .ink-option__preview {
      width: 100%;
      height: 66px;
      display: block;
      pointer-events: none;
    }

    .ink-option::after {
      content: "";
      display: block;
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: transparent;
      transition: background 160ms ease;
    }

    .ink-option.is-active::after {
      background: linear-gradient(90deg, rgba(47, 124, 246, 0.1), rgba(47, 124, 246, 0.78), rgba(47, 124, 246, 0.1));
    }

    .ink-option.is-active .ink-option__preview {
      filter: drop-shadow(0 6px 14px rgba(47, 124, 246, 0.16));
    }

    .workspace {
      min-height: 0;
    }

    .stage-viewport {
      position: relative;
      height: 100%;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .canvas-shell {
      position: relative;
      width: 0;
      height: 0;
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      background: transparent;
    }

    .canvas-shell > canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #paintCanvas {
      pointer-events: none;
    }

    #fxCanvas {
      touch-action: none;
      cursor: crosshair;
    }

    @keyframes export-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 1100px) {
      body {
        overflow: auto;
      }

      .app-shell {
        height: auto;
        min-height: 100vh;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        padding: 8px 10px 6px;
      }

      .header-tools {
        min-width: 100%;
        justify-content: flex-start;
      }

      .controls-panel {
        position: static;
        width: 100%;
        margin-top: 8px;
      }

      .slider-card input[type="range"] {
        width: 100%;
      }

      .ink-strip {
        grid-template-columns: repeat(auto-fit, minmax(116px, 1fr));
      }

      .ink-option__preview {
        height: 58px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="header-bar">
      <div class="brand">
        <div class="brand-meta">
          <strong id="activeInkName">Rainbow Chrome</strong>
          <span id="activeInkMeta">A shifting chrome ribbon with prismatic sparkles and rotating color flips.</span>
        </div>
      </div>

      <div class="header-tools">
        <div class="action-strip">
          <button class="action-button" id="undoButton" type="button">Undo</button>
          <button class="action-button action-button--primary" id="saveGifButton" type="button">Save</button>
          <button class="action-button action-button--primary" id="shareButton" type="button" title="Share GIF. Downloads the GIF if native sharing is unavailable.">Share</button>
        </div>

        <details class="controls-popover" id="controlsPopover">
          <summary class="toolbar-button">Controls</summary>
          <div class="controls-panel">
            <div class="slider-card">
              <label class="slider-label" for="brushSize">
                Brush Size
                <span class="slider-value" id="brushValue">20 px</span>
              </label>
              <input id="brushSize" type="range" min="6" max="48" step="1" value="20" aria-label="Brush size">
            </div>

            <div class="segmented" role="group" aria-label="Drawing mode">
              <button class="segment-button" type="button" data-mode="brush" aria-pressed="false">Brush</button>
              <button class="segment-button is-active" type="button" data-mode="spray" aria-pressed="true">Spray</button>
            </div>

            <div class="segmented" role="group" aria-label="Project actions">
              <button class="segment-button" id="clearButton" type="button">Clear</button>
              <button class="segment-button" id="saveButton" type="button">Save Project</button>
              <button class="segment-button" id="openButton" type="button">Open</button>
            </div>

            <div class="background-card">
              <span class="group-label">Background</span>
              <div id="backgroundPicker" class="background-grid" role="list" aria-label="Export background"></div>
            </div>

            <form class="size-card" id="canvasSizeForm">
              <span class="group-label">Canvas Size</span>
              <div class="size-grid">
                <label class="size-field" for="canvasWidthInput">
                  Width
                  <input id="canvasWidthInput" type="number" min="320" max="4096" step="10" inputmode="numeric" value="0">
                </label>
                <label class="size-field" for="canvasHeightInput">
                  Height
                  <input id="canvasHeightInput" type="number" min="320" max="4096" step="10" inputmode="numeric" value="0">
                </label>
                <button class="action-button size-apply" type="submit">Resize</button>
              </div>
            </form>
          </div>
        </details>
      </div>
    </header>

    <section class="ink-shelf" aria-label="Ink shelf">
      <div id="inkPicker" class="ink-strip" role="list"></div>
    </section>

    <section class="workspace">
      <div class="stage-viewport" id="stageViewport">
        <div class="canvas-shell" id="canvasShell">
          <canvas id="paintCanvas" aria-hidden="true"></canvas>
          <canvas id="fxCanvas" aria-label="Drawing surface"></canvas>
        </div>
      </div>
    </section>
  </main>

  <input id="projectInput" type="file" accept=".shimmerink,.json,application/json" hidden>

  <script type="module" src="./index.js"></script>
</body>
</html>
