<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ink Audit Timesteps</title>
  <style>
    :root {
      color-scheme: light;
      font-family: ui-rounded, "SF Pro Rounded", "Avenir Next Rounded", "Arial Rounded MT Bold", "Trebuchet MS", system-ui, sans-serif;
      color: #241a3c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #fffefb 0%, #f4efff 100%);
    }

    main {
      display: grid;
      gap: 18px;
      padding: 18px;
    }

    .group {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(111, 70, 230, 0.12);
      box-shadow: 0 14px 30px rgba(77, 48, 140, 0.08);
    }

    .group h2,
    .variant strong {
      margin: 0;
      letter-spacing: -0.03em;
    }

    .group p,
    .variant span,
    .sample label {
      margin: 0;
      color: rgba(56, 43, 85, 0.74);
    }

    .group h2 {
      font-size: 1.4rem;
    }

    .group p {
      font-size: 0.94rem;
    }

    .variants {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    }

    .variant {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(111, 70, 230, 0.1);
    }

    .variant strong {
      font-size: 1rem;
    }

    .variant span {
      font-size: 0.88rem;
      line-height: 1.3;
    }

    .samples {
      display: grid;
      gap: 8px;
    }

    .sample {
      display: grid;
      gap: 4px;
    }

    .sample label {
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sample canvas {
      width: 100%;
      height: 104px;
      display: block;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script type="module">
    import { inkById } from "./ink.js";
    import { buildParameterizedInkCatalog } from "./ink-variants.js";
    import { drawInkSwoopPreview } from "./ink-preview.js";

    const TIMES = [
      { label: "Early", ms: 1200 },
      { label: "Mature", ms: 2600 },
      { label: "Late", ms: 4200 }
    ];

    const params = new URLSearchParams(window.location.search);
    const inkFilter = params.get("ink");
    const { entries } = buildParameterizedInkCatalog(inkById);
    const app = document.getElementById("app");

    entries
      .filter((entry) => !inkFilter || entry.baseInkId === inkFilter)
      .forEach((entry) => {
      const section = document.createElement("section");
      const title = document.createElement("h2");
      const note = document.createElement("p");
      const variants = document.createElement("div");

      section.className = "group";
      title.textContent = entry.label;
      note.textContent = entry.note;
      variants.className = "variants";

      entry.variants.forEach((variant, variantIndex) => {
        const card = document.createElement("div");
        const heading = document.createElement("strong");
        const description = document.createElement("span");
        const samples = document.createElement("div");

        card.className = "variant";
        heading.textContent = variant.label;
        description.textContent = variant.description;
        samples.className = "samples";

        TIMES.forEach((time, timeIndex) => {
          const sample = document.createElement("div");
          const label = document.createElement("label");
          const canvas = document.createElement("canvas");

          sample.className = "sample";
          label.textContent = time.label;
          sample.appendChild(label);
          sample.appendChild(canvas);
          samples.appendChild(sample);

          requestAnimationFrame(() => {
            drawInkSwoopPreview(canvas, variant.preset, {
              active: variantIndex === 0,
              timeMs: time.ms + variantIndex * 120 + timeIndex * 16
            });
          });
        });

        card.appendChild(heading);
        card.appendChild(description);
        card.appendChild(samples);
        variants.appendChild(card);
      });

      section.appendChild(title);
      section.appendChild(note);
      section.appendChild(variants);
      app.appendChild(section);
      });
  </script>
</body>
</html>
